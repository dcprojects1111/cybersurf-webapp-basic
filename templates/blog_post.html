<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ post.title }} — CyberSurf Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Roboto',sans-serif;background:linear-gradient(160deg,#0a1628 0%,#0d2240 100%);min-height:100vh;padding:40px 20px;}
    nav{display:flex;align-items:center;justify-content:space-between;max-width:800px;margin:0 auto 40px;}
    .brand{font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px;color:#fff;text-decoration:none;}
    .brand span{color:#00d2ff;}
    .nav-link{font-size:13px;color:rgba(252,253,242,.4);text-decoration:none;border:1px solid rgba(255,255,255,.15);padding:6px 14px;border-radius:6px;}
    .nav-link:hover{color:#00d2ff;border-color:#00d2ff;}
    .article{max-width:800px;margin:0 auto;}
    .back{font-size:13px;color:#00d2ff;text-decoration:none;display:inline-block;margin-bottom:28px;}
    .back:hover{text-decoration:underline;}
    .post-date{font-size:12px;color:rgba(252,253,242,.35);font-family:'Montserrat',sans-serif;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
    h1{font-family:'Montserrat',sans-serif;font-weight:800;font-size:28px;color:#fcfdf2;margin-bottom:28px;line-height:1.3;}
    .content{background:rgba(255,255,255,.04);border:1px solid rgba(0,210,255,.2);border-radius:14px;padding:36px 40px;color:rgba(252,253,242,.85);font-size:16px;line-height:1.75;}
    .content h2{font-family:'Montserrat',sans-serif;font-weight:800;color:#fcfdf2;margin:28px 0 12px;}
    .content h3{font-family:'Montserrat',sans-serif;font-weight:700;color:#00d2ff;margin:22px 0 10px;}
    .content p{margin-bottom:16px;}
    .content ul,.content ol{padding-left:22px;margin-bottom:16px;}
    .content li{margin-bottom:6px;}
    .content a{color:#00d2ff;}
    .content strong{color:#fcfdf2;}
    .empty{color:rgba(252,253,242,.4);font-style:italic;}
    footer{text-align:center;max-width:800px;margin:40px auto 0;font-size:12px;color:rgba(252,253,242,.25);}
    footer a{color:rgba(0,210,255,.5);text-decoration:none;}
  </style>
</head>
<body>
  <nav>
    <a href="/blog" class="brand">Cyber<span>Surf</span> Blog</a>
    <a href="https://cybersurf.au" class="nav-link">CyberSurf.au &rarr;</a>
  </nav>
  <div class="article">
    <a href="/blog" class="back">&larr; All articles</a>
    {% if post.date %}<div class="post-date">{{ post.date }}</div>{% endif %}
    <h1>{{ post.title }}</h1>
    <div class="content">
      {% if post.content %}
        {{ post.content | safe }}
      {% else %}
        <p class="empty">Article content coming soon.</p>
      {% endif %}
    </div>
  </div>
  <footer>&copy; 2026 CyberSurf &nbsp;&middot;&nbsp; <a href="https://cybersurf.au">cybersurf.au</a></footer>
</body>
</html>
