<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberSurf — Payment Required</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Roboto',sans-serif;background:linear-gradient(160deg,#0a1628 0%,#0d2240 100%);min-height:100vh;padding:40px 20px;color:#fcfdf2;display:flex;align-items:center;justify-content:center;}
    .page{max-width:480px;width:100%;text-align:center;}
    .brand{font-family:'Montserrat',sans-serif;font-weight:800;font-size:20px;color:#fff;margin-bottom:40px;}
    .brand span{color:#00d2ff;}
    .card{background:rgba(255,255,255,.04);border:1px solid rgba(0,210,255,.15);border-radius:18px;padding:40px 36px;}
    .icon{font-size:44px;margin-bottom:20px;}
    h1{font-family:'Montserrat',sans-serif;font-weight:800;font-size:22px;color:#fcfdf2;margin-bottom:12px;}
    p{font-size:14px;color:rgba(252,253,242,.6);line-height:1.7;margin-bottom:28px;}
    .btn{display:inline-block;background:#00d2ff;color:#0a1628;font-family:'Montserrat',sans-serif;font-weight:800;font-size:13px;padding:14px 28px;border-radius:8px;text-decoration:none;letter-spacing:0.5px;}
    .note{font-size:11px;color:rgba(252,253,242,.3);margin-top:20px;line-height:1.6;}
    .note a{color:rgba(0,210,255,.5);text-decoration:none;}
  </style>
</head>
<body>
<div class="page">
  <div class="brand">Cyber<span>Surf</span> Security</div>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Payment required to book</h1>
    <p>
      Your booking link is generated automatically after payment is confirmed.<br/>
      If you've already paid, check your confirmation email for your personal booking link.
    </p>
    <a href="/book-home-scan-bundle" class="btn">Book &amp; Pay Now — $299</a>
    <div class="note">
      Already paid but can't find your email? Contact <a href="mailto:support@cybersurf.au">support@cybersurf.au</a>
    </div>
  </div>
</div>
</body>
</html>
