<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberSurf — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Roboto',sans-serif;background:linear-gradient(160deg,#0a1628 0%,#0d2240 60%,#0a3355 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{background:rgba(255,255,255,.05);border:1px solid rgba(0,210,255,.2);border-radius:18px;padding:48px 40px;width:100%;max-width:400px;text-align:center;}
    .brand{font-family:'Montserrat',sans-serif;font-weight:800;font-size:22px;color:#fff;margin-bottom:6px;}
    .brand span{color:#00d2ff;}
    .sub{font-size:13px;color:rgba(252,253,242,.45);margin-bottom:36px;}
    label{display:block;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#00d2ff;text-align:left;margin-bottom:8px;}
    input[type=password]{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(0,210,255,.22);border-radius:8px;padding:13px 16px;font-size:15px;color:#fcfdf2;outline:none;margin-bottom:20px;}
    input[type=password]:focus{border-color:#00d2ff;}
    button{width:100%;background:linear-gradient(135deg,#00d2ff 0%,#0077be 100%);color:#fff;font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;padding:14px;border:none;border-radius:10px;cursor:pointer;}
    .error{background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.3);color:#ff4757;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:20px;}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Cyber<span>Surf</span> Security</div>
    <p class="sub">Internal Breach Check Tool</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter dashboard password" autofocus/>
      <button type="submit">Sign In &rarr;</button>
    </form>
  </div>
</body>
</html>
